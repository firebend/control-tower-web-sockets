@for (toast of toastService.toasts; track toast) {
  <ngb-toast
    [header]="toast.header"
    [class]="toast.className"
    [autohide]="toast.autoHide"
    [delay]="toast.delay || 5000"
    (hide)="toastService.remove(toast)"
  >
    @if (toast.isTemplateReference) {
      <ng-template
        [ngTemplateOutlet]="toast.messageAsTemplateReference"
      ></ng-template>
    } @else {
      {{ toast.message }}
    }
  </ngb-toast>
}
